<!DOCTYPE html>

<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>乗り換え記録</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <link rel="stylesheet" href="/static/style.css?v=2">

</head>

<body>

  <header>

    <h1>乗り換え記録</h1>

    <p>移動区間（路線）と行った場所（📍）は別々に登録・編集します</p>

  </header>



  <main class="layout">

    <aside class="sidebar">

      <section class="panel">

        <h2>記録の基本情報</h2>

        <label>日付</label>

        <input type="date" id="trip-date">



        <label>タイトル（任意）</label>

        <input type="text" id="trip-title" placeholder="例: 栃木日帰り">

        <p class="hint" id="selected-trip-hint">区間と行った場所は別々に入力し、同じ日付の記録にまとめて保存されます</p>

        <button type="button" id="new-trip-btn">新規</button>

      </section>



      <section class="panel" id="segment-panel">

        <h2>移動区間</h2>

        <label>区間テキスト</label>

        <textarea id="trip-text" rows="8" placeholder="押上6:34→東武動物公園7:23&#10;東武動物公園7:34→館林8:11"></textarea>

        <button type="button" id="preview-segment-btn" class="primary">区間を確認</button>

        <ul id="segment-list" class="segment-list"></ul>

        <div id="segment-confirm" class="confirm-block hidden">

          <h3 class="confirm-subtitle">区間（路線を選択）</h3>
          <p class="hint">乗換番号は「降車した駅」だけ。途中そのまま乗車の区間はチェックを外してください</p>

          <div id="segment-options"></div>

          <p class="hint" id="segment-save-hint"></p>

          <button type="button" id="save-segment-btn" class="primary" disabled>区間を保存</button>

        </div>

      </section>



      <section class="panel" id="place-panel">

        <h2>行った場所</h2>

        <p class="hint">公園・お店・観光地など。路線の駅とは別に📍で表示します</p>

        <div class="dest-form">

          <input type="text" id="place-name" placeholder="例: あしかがフラワーパーク、香蘭">

          <div class="dest-time-row">

            <input type="text" id="place-arrive" placeholder="到着 11:50">

            <span>〜</span>

            <input type="text" id="place-depart" placeholder="出発 12:23">

          </div>

          <input type="text" id="place-memo" placeholder="メモ（任意）">

          <button type="button" id="add-place-btn">行った場所を追加</button>

        </div>

        <ul id="place-list" class="dest-editable-list"></ul>

        <button type="button" id="preview-place-btn">📍の位置を確認</button>
        <button type="button" id="save-place-direct-btn" class="primary" disabled>行った場所を保存</button>

        <div id="place-confirm" class="confirm-block hidden">

          <h3 class="confirm-subtitle">行った場所（📍の位置を選択）</h3>

          <div id="place-options"></div>

          <p id="place-save-hint" class="confirm-subtitle"></p>

          <button type="button" id="save-place-btn" class="primary" disabled>行った場所を保存</button>

        </div>

      </section>



      <section class="panel">

        <h2>外部データ</h2>

        <p class="hint">data/imports/ に JSON を置いて取り込み</p>

        <button id="import-btn">インポートフォルダを読み込み</button>

        <button id="export-btn" disabled>選択中の記録をJSON出力</button>

        <button id="rebuild-btn" disabled>線路形状を再取得</button>

      </section>



      <section class="panel">

        <h2>記録一覧</h2>

        <ul id="trip-list"></ul>

      </section>

    </aside>



    <section class="map-area">

      <div id="map"></div>

      <div id="segment-detail" class="segment-detail hidden" data-map-detail>
        <button type="button" class="detail-close-btn" title="詳細を閉じる" aria-label="詳細を閉じる">×</button>
        <h3 id="detail-title"></h3>
        <dl id="detail-body"></dl>
      </div>

      <div class="map-toolbar">
        <div class="map-view-switch" role="group" aria-label="表示切替">
          <a href="/" class="map-view-btn" data-view="segments">区間</a>
          <a href="/destinations" class="map-view-btn" data-view="destinations">📍</a>
        </div>
        <button type="button" id="detail-toggle-btn" class="map-toolbar-btn" aria-pressed="true">詳細 ON</button>
      </div>

    </section>

  </main>



  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/map-ui.js?v=2"></script>
  <script src="/static/app.js?v=54"></script>

</body>

</html>
