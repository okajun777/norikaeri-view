<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行った場所 — 乗り換え記録</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <header>
    <h1>行った場所</h1>
    <p>📍 閲覧専用 · 更新 {{ exported_at }}</p>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>記録一覧</h2>
        <ul id="trip-list"></ul>
      </section>

      <section class="panel">
        <h2>行った場所</h2>
        <p class="hint" id="destination-hint">記録にチェックを入れると 📍 と路線が地図に表示されます（複数可）</p>
        <ul id="destination-list" class="destination-view-list"></ul>
      </section>
    </aside>

    <section class="map-area">
      <div id="map"></div>
      <div id="destination-detail" class="segment-detail hidden" data-map-detail>
        <button type="button" class="detail-close-btn" title="詳細を閉じる" aria-label="詳細を閉じる">×</button>
        <h3 id="detail-title"></h3>
        <dl id="detail-body"></dl>
      </div>
      <div class="map-toolbar">
        <button type="button" id="detail-toggle-btn" class="map-toolbar-btn" aria-pressed="true">詳細 ON</button>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="view-data.js"></script>
  <script src="map-ui.js"></script>
  <script src="trip-map-draw.js"></script>
  <script src="destinations.js"></script>
</body>
</html>
